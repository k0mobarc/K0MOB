# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://k0mobarc.github.io/"
title: K0MOB
copyright: "© 2026 K0MOB. All rights reserved."
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["about", "posts", "events"]

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 3

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:

        - name: About
          url: about/
          weight: 1 
        - name: Posts
          url: posts/ 
          weight: 2
        - name: Archive
          url: archives/
          weight: 5

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: false
  # comments: false
  images: ["images/Tri.jpg"] # to be used in structured data when .Params.images is not set for a page

  profileMode:
    enabled: true
    title: "Welcome to the tri-county amateur radio club website"
    imageUrl: "images/Tri.jpg"
    imageTitle: "Tri County Amateur Radio Club"
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: About
        url: about/
      - name: Posts
        url: posts/
    
    assets:
      disableHLJS: true
      favicon: "favicon.png"  
      favicon16x16: "favicon16.png"
      favicon32x32: "favicon32.png"

  editPost:
    URL: "https://github.com/K0MOBARC/K0MOB/edit/main/content" # edit URL
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
